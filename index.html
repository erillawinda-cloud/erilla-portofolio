<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Erilla Windayani | Automation Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
GLOBAL
========================= */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#f8fafc;
}


/* =========================
HERO
========================= */

.hero{
min-height:100vh;
background:linear-gradient(135deg,#1e3a8a,#0f172a);
color:white;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;

padding:40px 20px;
}


/* PROFILE IMAGE */

.profile{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;

border:6px solid rgba(255,255,255,0.85);

margin-bottom:30px;
}


/* NAME */

.hero h1{
font-size:48px;
margin-bottom:15px;
}


/* TITLE */

.hero-subtitle{
font-size:22px;
opacity:0.9;
margin-bottom:25px;
}


/* DESCRIPTION */

.hero-desc{
max-width:520px;
opacity:0.85;
font-size:18px;
line-height:1.7;
margin-bottom:40px;
}


/* =========================
BUTTONS
========================= */

.hero-buttons{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:14px 32px;
border-radius:10px;
font-size:16px;
font-weight:500;
cursor:pointer;
transition:0.25s;
text-decoration:none;
}

.btn-primary{
background:#3b82f6;
color:white;
}

.btn-primary:hover{
background:#2563eb;
}

.btn-outline{
border:1.5px solid rgba(255,255,255,0.6);
color:white;
}

.btn-outline:hover{
background:rgba(255,255,255,0.1);
}


/* =========================
CONTACT SECTION
========================= */

.contact{
padding:100px 20px;
background:white;
text-align:center;
}

.contact h2{
font-size:32px;
margin-bottom:30px;
color:#0f172a;
}

.contact-links{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.contact-links a{
background:#e2e8f0;
padding:12px 24px;
border-radius:8px;
text-decoration:none;
color:#0f172a;
font-weight:500;
transition:0.2s;
}

.contact-links a:hover{
background:#cbd5f5;
}


/* =========================
RESPONSIVE
========================= */

@media (max-width:768px){

.hero h1{
font-size:32px;
}

.hero-subtitle{
font-size:18px;
}

}

</style>

</head>

<body>


<section class="hero">

<img
class="profile"
src="https://lh3.googleusercontent.com/d/1osk4j4-Zyn9c6d43an9w3l7frewGhj4N"
/>

<h1>Erilla Windayani</h1>

<p class="hero-subtitle">
Automation & Workflow Specialist
</p>

<p class="hero-desc">
I build automation tools using Google Apps Script and Google Sheets to streamline workflows, reduce manual tasks, and organize data efficiently.
</p>

<div class="hero-buttons">

<a href="#" class="btn btn-primary">
View Portfolio
</a>

<a href="#contact" class="btn btn-outline">
Contact Me
</a>

</div>

</section>



<section id="contact" class="contact">

<h2>Contact</h2>

<div class="contact-links">

<a href="mailto:erillawinda@gmail.com">
Email
</a>

<a href="https://www.linkedin.com/in/erilla-windayani-36672a1b6/" target="_blank">
LinkedIn
</a>

<a href="https://github.com/erillawinda-cloud" target="_blank">
GitHub
</a>

</div>

</section>


</body>
</html>
