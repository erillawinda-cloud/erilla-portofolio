<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Erilla Windayani | Automation Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
GLOBAL
========================= */

*{
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
margin:0;
background:#f8fafc;
color:#0f172a;
line-height:1.6;
}

h1,h2,h3{
margin:0;
font-weight:600;
}

a{
text-decoration:none;
}

.container{
max-width:1100px;
margin:auto;
padding:80px 20px;
}


/* =========================
NAVBAR
========================= */

.navbar{
position:fixed;
top:0;
right:0;
width:100%;
display:flex;
justify-content:flex-end;
padding:20px 40px;
background:rgba(15,23,42,0.7);
backdrop-filter:blur(6px);
z-index:999;
}


/* =========================
HERO
========================= */

.hero{
background:linear-gradient(135deg,#1e3a8a,#0f172a);
color:white;
text-align:center;
padding:220px 20px 160px;
}

.profile{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:6px solid rgba(255,255,255,0.85);
margin-bottom:30px;
}

.hero h1{
font-size:48px;
font-weight:600;
margin-bottom:15px;
}

.hero-subtitle{
font-size:22px;
opacity:0.9;
margin-bottom:30px;
}

.hero-desc{
max-width:520px;
margin:auto;
opacity:0.85;
font-size:18px;
line-height:1.7;
}


/* HERO BUTTONS */

.hero-buttons{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:14px 32px;
border-radius:10px;
font-size:16px;
font-weight:500;
cursor:pointer;
transition:0.25s;
}

.btn-primary{
background:#3b82f6;
color:white;
}

.btn-primary:hover{
background:#2563eb;
}

.btn-outline{
border:1.5px solid rgba(255,255,255,0.6);
color:white;
}

.btn-outline:hover{
background:rgba(255,255,255,0.1);
}


/* =========================
FOOTER
========================= */

footer{
text-align:center;
padding:40px;
color:#64748b;
font-size:14px;
border-top:1px solid #e2e8f0;
}


/* =========================
RESPONSIVE
========================= */

@media (max-width:768px){

.hero h1{
font-size:30px;
}

.hero{
padding:160px 20px 120px;
}

}

</style>

</head>

<body>


<!-- =========================
NAVBAR
========================= -->

<div class="navbar"></div>



<!-- =========================
HERO
========================= -->

<section class="hero">

<img
class="profile"
src="https://lh3.googleusercontent.com/d/1EYetGQUkhQpC1NiZm0XtnyqwksArl5xy"
/>

<h1>Erilla Windayani</h1>

<p class="hero-subtitle">
Automation & Workflow Specialist
</p>

<p class="hero-desc">
I build automation tools using Google Apps Script and Google Sheets to streamline workflows, reduce manual tasks, and organize data efficiently.
</p>

<div class="hero-buttons">

<a href="#" class="btn btn-primary">
View Portfolio
</a>

<a href="#" class="btn btn-outline">
Contact Me
</a>

</div>

</section>



<footer>

© 2026 Erilla Windayani

</footer>



</body>
</html>
